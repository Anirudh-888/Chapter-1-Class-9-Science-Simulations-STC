<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STCpedia Lab - Gas State Physics & Compression</title>
    <style>
        :root {
            --bg-dark: #090d16;
            --panel-bg: #151f32;
            --text-light: #f1f5f9;
            --stc-yellow: #facc15;
            --stc-cyan: #22d3ee;
            --stc-orange: #f97316;
            --stc-red: #ef4444;
            --stc-green: #10b981;
            --border-ui: #334155;
        }

        body {
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .lab-wrapper {
            background-color: var(--panel-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header-container {
            text-align: center;
            border-bottom: 2px solid var(--border-ui);
            padding-bottom: 12px;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
            color: var(--stc-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .navbar {
            display: grid;
            grid-template-columns: 1fr 1.1fr 1.1fr;
            gap: 10px;
        }

        .nav-btn {
            background: #1e293b;
            border: 2px solid var(--border-ui);
            color: #94a3b8;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: #273549;
            color: white;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #0284c7, #0369a1);
            border-color: var(--stc-cyan);
            color: white;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
        }

        .viewport-container {
            position: relative;
            background: radial-gradient(circle at center, #020617 0%, #000000 100%);
            border: 3px solid var(--border-ui);
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
        }

        .dashboard-controls {
            background: rgba(2, 6, 23, 0.4);
            border: 1px solid var(--border-ui);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 90px;
            justify-content: center;
        }

        .control-element {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
        }

        .interactive-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 10px;
            background: #1e293b;
            border-radius: 6px;
            outline: none;
        }

        .interactive-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--stc-yellow);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            background: #1e293b;
            border: 1px solid var(--border-ui);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .action-btn:hover:not(:disabled) {
            background: #273549;
            border-color: #cbd5e1;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, var(--stc-orange), #c2410c);
            border-color: #f97316;
        }

        .action-btn.primary:hover:not(:disabled) {
            box-shadow: 0 0 12px rgba(249, 115, 22, 0.4);
            opacity: 0.95;
        }

        .action-btn.secondary {
            background: linear-gradient(135deg, #475569, #334155);
            border-color: #64748b;
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .stcpedia-feedback {
            border-left: 5px solid var(--stc-yellow);
            background: linear-gradient(90deg, rgba(250, 204, 21, 0.08) 0%, transparent 100%);
            padding: 16px;
            border-radius: 6px;
        }

        .avatar-title {
            font-weight: bold;
            color: var(--stc-yellow);
            text-transform: uppercase;
            font-size: 0.85rem;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .speech-text {
            font-size: 0.98rem;
            line-height: 1.5;
            color: #cbd5e1;
        }

        .speech-text strong {
            color: var(--stc-cyan);
        }
    </style>
</head>
<body>

    <div class="lab-wrapper">
        <div class="header-container">
            <h1>Particle Level Gas Behavior Lab</h1>
        </div>

        <div class="navbar">
            <button class="nav-btn active" id="btn-motion" onclick="changeMode('motion')">1. Random Motion & Pressure</button>
            <button class="nav-btn" id="btn-compress" onclick="changeMode('compress')">2. Syringe Compression</button>
            <button class="nav-btn" id="btn-pump" onclick="changeMode('pump')">3. Store Gas (Cylinder)</button>
        </div>

        <div class="viewport-container" id="screenFrame">
            <canvas id="gasCanvas" width="670" height="340"></canvas>
        </div>

        <div class="dashboard-controls" id="dashboardControls">
            <!-- Dynamic Controls inserted by JavaScript -->
        </div>

        <div class="stcpedia-feedback">
            <div class="avatar-title">⚡ STCpedia Lab Assistant:</div>
            <div id="speakerBox" class="speech-text">Loading gas particles simulation...</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gasCanvas');
        const ctx = canvas.getContext('2d');
        const speakerBox = document.getElementById('speakerBox');
        const dashboardControls = document.getElementById('dashboardControls');
        const screenFrame = document.getElementById('screenFrame');

        let currentMode = 'motion';
        let particles = [];
        let ripples = []; // Collision ripples
        let momentumHistory = Array(60).fill(0);
        let momentumTransferSum = 0;
        let smoothedPressure = 0;

        // Simulator Parameters
        let temperature = 300; // Kelvin
        let targetVolume = 5.0; // Liters
        let currentVolume = 5.0; 
        let pistonY = 40; // Syringe piston vertical position
        let pumpY = 110; // Pump handle plunger Y
        let pumpState = 'idle'; // idle, pulling, pushing
        let safetyValveOpen = false;
        let safetyValveTimer = 0;
        let maxAllowedParticles = 160;

        // Particle Class
        class GasParticle {
            constructor(x, y, vx, vy, isPumped = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.radius = 4.5;
                this.mass = 1.0;
                this.color = isPumped ? '#fb923c' : '#22d3ee'; // orange for pumped gas, cyan for base
                this.glow = isPumped ? 'rgba(249, 115, 22, 0.4)' : 'rgba(34, 211, 238, 0.4)';
            }

            move(leftWall, rightWall, topWall, bottomWall) {
                // Adjust speed based on temperature scale factor
                // Speed is proportional to square root of Temperature (Kelvin)
                let tempSpeedScale = Math.sqrt(temperature / 300);
                
                this.x += this.vx * tempSpeedScale;
                this.y += this.vy * tempSpeedScale;

                // --- Boundary Collisions & Momentum Calculations ---
                
                // Left Wall
                if (this.x - this.radius < leftWall) {
                    this.x = leftWall + this.radius;
                    let momentum = 2 * this.mass * Math.abs(this.vx * tempSpeedScale);
                    momentumTransferSum += momentum;
                    this.vx *= -1;
                    addRipple(leftWall, this.y, this.color);
                }
                
                // Right Wall
                if (this.x + this.radius > rightWall) {
                    this.x = rightWall - this.radius;
                    let momentum = 2 * this.mass * Math.abs(this.vx * tempSpeedScale);
                    momentumTransferSum += momentum;
                    this.vx *= -1;
                    addRipple(rightWall, this.y, this.color);
                }
                
                // Top Wall (Piston/Lid)
                if (this.y - this.radius < topWall) {
                    this.y = topWall + this.radius;
                    let momentum = 2 * this.mass * Math.abs(this.vy * tempSpeedScale);
                    momentumTransferSum += momentum;
                    this.vy *= -1;
                    addRipple(this.x, topWall, this.color);
                }
                
                // Bottom Wall
                if (this.y + this.radius > bottomWall) {
                    this.y = bottomWall - this.radius;
                    let momentum = 2 * this.mass * Math.abs(this.vy * tempSpeedScale);
                    momentumTransferSum += momentum;
                    this.vy *= -1;
                    addRipple(this.x, bottomWall, this.color);
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(this.x - 1, this.y - 1, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.4, this.color);
                grad.addColorStop(1, '#020617');
                ctx.fillStyle = grad;
                
                ctx.shadowBlur = 6;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // Ripple Animation Class
        class CollisionRipple {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.radius = 1;
                this.maxRadius = 15;
                this.alpha = 1.0;
                this.color = color;
            }

            update() {
                this.radius += 0.65;
                this.alpha -= 0.055;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
            }
        }

        function addRipple(x, y, color) {
            ripples.push(new CollisionRipple(x, y, color));
            if (ripples.length > 50) ripples.shift();
        }

        // Generate Gas Particles
        function generateParticles(count, minX, maxX, minY, maxY, isPumped = false) {
            let list = [];
            for (let i = 0; i < count; i++) {
                let x = minX + Math.random() * (maxX - minX);
                let y = minY + Math.random() * (maxY - minY);
                
                let angle = Math.random() * Math.PI * 2;
                let speed = 1.8 + Math.random() * 1.2;
                let vx = Math.cos(angle) * speed;
                let vy = Math.sin(angle) * speed;
                
                list.push(new GasParticle(x, y, vx, vy, isPumped));
            }
            return list;
        }

        // Initialize Simulation modes
        function changeMode(mode) {
            currentMode = mode;
            
            // UI Button highlights
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            // Reset engine parameters
            ripples = [];
            momentumHistory = Array(60).fill(0);
            smoothedPressure = 1.0;
            safetyValveOpen = false;
            safetyValveTimer = 0;

            if (mode === 'motion') {
                temperature = 300;
                particles = generateParticles(55, 30, 390, 40, 290);
                renderControlsHUD();
            } else if (mode === 'compress') {
                temperature = 300;
                targetVolume = 5.0;
                currentVolume = 5.0;
                pistonY = 40;
                // Place particles in the cylinder bounds
                particles = generateParticles(50, 95, 325, 60, 295);
                renderControlsHUD();
            } else if (mode === 'pump') {
                temperature = 300;
                pumpY = 110;
                pumpState = 'idle';
                // Cylinder starts with 15 baseline particles (empty cylinder is never absolute vacuum in practical lab experiments)
                particles = generateParticles(15, 175, 365, 75, 265);
                renderControlsHUD();
            }
        }

        // Render controls panel below canvas based on active mode
        function renderControlsHUD() {
            if (currentMode === 'motion') {
                dashboardControls.innerHTML = `
                    <div class="control-element">
                        <div class="control-header">
                            <span>🌡️ ADJUST GAS TEMPERATURE:</span>
                            <span id="tempBadge" style="color:var(--stc-cyan); font-weight:bold;">300 K (27°C) - Room Temp</span>
                        </div>
                        <input type="range" class="interactive-slider" id="tempSlider" min="100" max="600" value="300" oninput="handleTemperature(this.value)">
                    </div>
                `;
                updateDialogue();
            } else if (currentMode === 'compress') {
                dashboardControls.innerHTML = `
                    <div class="control-element">
                        <div class="control-header">
                            <span>↕️ DRAG SYRINGE PISTON (VOLUME):</span>
                            <span id="volumeBadge" style="color:var(--stc-yellow); font-weight:bold;">5.0 Liters</span>
                        </div>
                        <input type="range" class="interactive-slider" id="volumeSlider" min="10" max="50" value="50" oninput="handleVolume(this.value)">
                    </div>
                `;
                updateDialogue();
            } else if (currentMode === 'pump') {
                dashboardControls.innerHTML = `
                    <div class="btn-group">
                        <button class="action-btn primary" id="pumpBtn" onclick="triggerPumpStroke()">💨 Press Pump Handle</button>
                        <button class="action-btn secondary" id="valveBtn" onclick="triggerSafetyValve()">🔧 Open Release Valve</button>
                    </div>
                `;
                updateDialogue();
            }
        }

        function handleTemperature(val) {
            temperature = parseInt(val);
            let celsius = temperature - 273;
            let label = `${temperature} K (${celsius}°C)`;
            if (temperature === 300) label += " - Room Temp";
            else if (temperature < 200) label += " - Freezing Cold";
            else if (temperature > 500) label += " - Extremely Hot";
            document.getElementById('tempBadge').innerText = label;
            updateDialogue();
        }

        function handleVolume(val) {
            // Slider goes 10 (1.0L) to 50 (5.0L)
            targetVolume = parseFloat(val) / 10.0;
        }

        function triggerPumpStroke() {
            if (pumpState !== 'idle') return;
            if (particles.length >= maxAllowedParticles) {
                speakerBox.innerHTML = "⚠️ <strong>WARNING: Cylinder Pressure is Maxed Out!</strong> The container cannot hold more gas. Open the <strong>Release Valve</strong> to let some molecules escape!";
                return;
            }
            pumpState = 'pulling';
            document.getElementById('pumpBtn').disabled = true;
        }

        function triggerSafetyValve() {
            safetyValveOpen = true;
            safetyValveTimer = 90; // Valve stays open for 90 frames (~1.5s)
            speakerBox.innerHTML = "💨 <strong>Release Valve Opened!</strong> Gas particles rush out from the high pressure cylinder into the atmosphere, causing the pressure to drop.";
        }

        // Collision detection between particles (Elastic collisions)
        function handleParticleCollisions() {
            let len = particles.length;
            for (let i = 0; i < len; i++) {
                for (let j = i + 1; j < len; j++) {
                    let p1 = particles[i];
                    let p2 = particles[j];

                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let minDist = p1.radius + p2.radius;

                    if (dist < minDist) {
                        // Prevent overlap
                        if (dist === 0) {
                            p1.x += Math.random() - 0.5;
                            p2.x += Math.random() - 0.5;
                            continue;
                        }
                        let overlap = minDist - dist;
                        let nx = dx / dist;
                        let ny = dy / dist;

                        // Separate particles along collision vector
                        p1.x -= nx * overlap * 0.5;
                        p1.y -= ny * overlap * 0.5;
                        p2.x += nx * overlap * 0.5;
                        p2.y += ny * overlap * 0.5;

                        // Swapping velocities along normal (elastic collision of equal mass particles)
                        // Project velocities onto normal and tangent vectors
                        let kx = p1.vx - p2.vx;
                        let ky = p1.vy - p2.vy;
                        let p = nx * kx + ny * ky; // scalar project

                        p1.vx -= p * nx;
                        p1.vy -= p * ny;
                        p2.vx += p * nx;
                        p2.vy += p * ny;
                    }
                }
            }
        }

        // Dialogue Box Texts (Class 9 targeted language)
        function updateDialogue() {
            if (currentMode === 'motion') {
                if (temperature < 200) {
                    speakerBox.innerHTML = "At <strong>low temperatures</strong>, gas particles lose kinetic energy and slow down. Because they move slowly, their collisions with the walls are less forceful, resulting in <strong>lower pressure</strong>.";
                } else if (temperature > 450) {
                    speakerBox.innerHTML = "<strong>High temperature increases kinetic energy!</strong> Notice how fast the cyan particles are zip-zapping. They strike the walls much harder and more frequently, creating <strong>very high pressure</strong>.";
                } else {
                    speakerBox.innerHTML = "Gases consist of particles that move <strong>randomly in all directions</strong>. As they move, they collide with each other and strike the walls. The force of these collisions per unit area exerts <strong>gas pressure</strong>.";
                }
            } else if (currentMode === 'compress') {
                if (currentVolume > 4.0) {
                    speakerBox.innerHTML = "Gases have <strong>large intermolecular spaces</strong>. Right now, in this large volume (5L), particles have plenty of space, so wall collisions are relatively infrequent, resulting in a normal pressure of 1 atm.";
                } else if (currentVolume <= 4.0 && currentVolume > 2.0) {
                    speakerBox.innerHTML = "As you push the piston down, you are <strong>compressing the gas</strong>. Notice that the volume is decreasing and particles are getting closer. The frequency of collisions on the walls is beginning to rise.";
                } else {
                    speakerBox.innerHTML = "<strong>High Compression!</strong> Squeezing the gas into a 1L space reduces the volume dramatically. With very little room, the particles collide with the walls of the syringe constantly! This causes the <strong>pressure to skyrocket</strong>.";
                }
            } else if (currentMode === 'pump') {
                if (safetyValveOpen) {
                    // Handled dynamically in cycle
                } else if (particles.length <= 25) {
                    speakerBox.innerHTML = "This empty cylinder has low pressure. Press the <strong>Pump Handle</strong> to inject liters of gas from the pump chamber into the metal container.";
                } else if (particles.length > 25 && particles.length < 80) {
                    speakerBox.innerHTML = "Every time you pump, you squeeze a large volume of gas particles through a narrow tube into this rigid cylinder. This shows how we store <strong>huge volumes of gases</strong> in small cylinders!";
                } else {
                    speakerBox.innerHTML = "<strong>Highly Compressed State!</strong> Look at how dense the particles are inside the cylinder now. We have compressed many liters of gas into this small tank (like LPG or CNG). The pressure is very high!";
                }
            }
        }

        // Draw HUD Telemetry (Pressure Dial & Stats)
        function drawTelemetry(xStart, yStart, width, height) {
            // Draw background panel
            ctx.save();
            ctx.fillStyle = 'rgba(21, 31, 50, 0.65)';
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.roundRect(xStart, yStart, width, height, 12);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // Section 1: Pressure Gauge Dial
            let dialX = xStart + width / 2;
            let dialY = yStart + 80;
            let dialRadius = 55;

            // Draw outer chrome bezel
            ctx.save();
            ctx.beginPath();
            ctx.arc(dialX, dialY, dialRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#090d16';
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 4;
            ctx.fill();
            ctx.stroke();

            // Draw colored warning arcs (Green, Yellow, Red)
            // Arc goes from -1.25pi to 0.25pi
            let startArc = -1.25 * Math.PI;
            let endArc = 0.25 * Math.PI;
            let totalArcLength = endArc - startArc;

            // Green zone (0 - 4 atm)
            ctx.beginPath();
            ctx.arc(dialX, dialY, dialRadius - 6, startArc, startArc + totalArcLength * 0.4);
            ctx.strokeStyle = '#10b981';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Yellow zone (4 - 7 atm)
            ctx.beginPath();
            ctx.arc(dialX, dialY, dialRadius - 6, startArc + totalArcLength * 0.4, startArc + totalArcLength * 0.7);
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Red zone (7 - 10 atm)
            ctx.beginPath();
            ctx.arc(dialX, dialY, dialRadius - 6, startArc + totalArcLength * 0.7, endArc);
            ctx.strokeStyle = '#ef4444';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Draw Dial Markers (0, 2, 4, 6, 8, 10 atm)
            ctx.fillStyle = '#94a3b8';
            ctx.font = 'bold 9px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            for (let i = 0; i <= 10; i += 2) {
                let angle = startArc + (i / 10) * totalArcLength;
                let tx = dialX + Math.cos(angle) * (dialRadius - 16);
                let ty = dialY + Math.sin(angle) * (dialRadius - 16);
                ctx.fillText(i, tx, ty);
            }

            // Draw Pressure Needle pointing to smoothedPressure
            let pressureVal = Math.min(10, Math.max(0, smoothedPressure));
            let needleAngle = startArc + (pressureVal / 10) * totalArcLength;
            
            ctx.beginPath();
            ctx.moveTo(dialX, dialY);
            ctx.lineTo(dialX + Math.cos(needleAngle) * (dialRadius - 10), dialY + Math.sin(needleAngle) * (dialRadius - 10));
            ctx.strokeStyle = '#f1f5f9';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            // Center pin
            ctx.beginPath();
            ctx.arc(dialX, dialY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#facc15';
            ctx.fill();
            ctx.restore();

            // Digital Output Label
            ctx.save();
            ctx.fillStyle = '#cbd5e1';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("GAS PRESSURE", dialX, dialY + dialRadius + 18);
            
            ctx.font = 'bold 15px monospace';
            ctx.fillStyle = smoothedPressure > 7.0 ? '#ef4444' : (smoothedPressure > 4.0 ? '#facc15' : '#10b981');
            ctx.fillText(smoothedPressure.toFixed(2) + " atm", dialX, dialY + dialRadius + 36);
            ctx.restore();

            // Section 2: Stats Digital HUD Readouts
            let hudY = dialY + dialRadius + 55;
            ctx.save();
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#94a3b8';

            // Particle Count
            ctx.fillText("PARTICLE DENSITY:", xStart + 20, hudY);
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = '#f8fafc';
            ctx.fillText(particles.length + " Molecules", xStart + 20, hudY + 16);

            // Volume
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText("VOLUME CAPACITY:", xStart + 20, hudY + 40);
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = '#f8fafc';
            let volText = currentVolume.toFixed(1) + " Liters";
            if (currentMode === 'motion') volText = "5.0 Liters (Fixed)";
            else if (currentMode === 'pump') volText = "2.0 Liters (Fixed)";
            ctx.fillText(volText, xStart + 20, hudY + 56);

            // Temperature
            ctx.font = 'bold 11px sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText("THERMAL ENERGY:", xStart + 20, hudY + 80);
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = '#f8fafc';
            let tempText = temperature + " K (" + (temperature - 273) + "°C)";
            ctx.fillText(tempText, xStart + 20, hudY + 96);
            ctx.restore();
        }

        // Physics Engine updates and Drawer
        function updateAndRender() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Compute Pressure from Momentum history
            // Sum momentum for this frame and push it to the rolling queue
            momentumHistory.push(momentumTransferSum);
            momentumTransferSum = 0;
            if (momentumHistory.length > 60) {
                momentumHistory.shift();
            }

            // Sum the last 60 frames (~1.0s window)
            let totalMomentum = momentumHistory.reduce((a, b) => a + b, 0);

            // Calculate active perimeter
            let perimeter = 1.0;
            if (currentMode === 'motion') {
                perimeter = 2 * (370 + 250); // Width: 370, Height: 250
            } else if (currentMode === 'compress') {
                let height = 270 - pistonY;
                perimeter = 2 * (230 + height); // Width: 230, Height: height
            } else if (currentMode === 'pump') {
                perimeter = 2 * (190 + 200); // Cylinder size
            }

            // Calibration to real-world atmospheric scale
            let basePressure = totalMomentum / (perimeter * 60); 
            let pressureCalibration = 1800; // calibrated for ~1.0atm standard
            let rawPressureVal = basePressure * pressureCalibration;
            
            // Smoothed pressure with exponential lag for realistic indicator movement
            smoothedPressure = smoothedPressure * 0.94 + rawPressureVal * 0.06;
            if (smoothedPressure < 0.05) smoothedPressure = 0.05;

            // Update safety valve animations in Mode 3
            if (currentMode === 'pump' && safetyValveOpen) {
                safetyValveTimer--;
                if (safetyValveTimer <= 0) {
                    safetyValveOpen = false;
                    document.getElementById('valveBtn').disabled = false;
                    updateDialogue();
                }
            }

            // --- Draw Telemetry Panel ---
            drawTelemetry(440, 15, 215, 310);

            // --- MODE 1: RANDOM MOTION & TEMPERATURE ---
            if (currentMode === 'motion') {
                let leftW = 30, rightW = 400, topW = 40, bottomW = 290;

                // Draw Glass Container
                ctx.save();
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 5;
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#38bdf8';
                ctx.strokeRect(leftW, topW, rightW - leftW, bottomW - topW);
                
                // Translucent fill
                ctx.fillStyle = 'rgba(34, 211, 238, 0.02)';
                ctx.fillRect(leftW, topW, rightW - leftW, bottomW - topW);
                ctx.restore();

                // Draw Container Label
                ctx.save();
                ctx.fillStyle = '#64748b';
                ctx.font = '10px sans-serif';
                ctx.fillText("RIGID CONTAINER (FIXED VOLUME: 5.0 LITERS)", leftW + 5, topW - 8);
                ctx.restore();

                // Update & Draw Particles
                handleParticleCollisions();
                particles.forEach(p => {
                    p.move(leftW, rightW, topW, bottomW);
                    p.draw();
                });
            }

            // --- MODE 2: COMPRESSION (SYRINGE) ---
            else if (currentMode === 'compress') {
                let leftW = 95, rightW = 325, bottomW = 295;
                
                // Animate piston smoothly towards targetVolume
                let targetPistonY = 40 + (5.0 - targetVolume) * 45; // maps 5.0L -> 40px, 1.0L -> 220px
                pistonY = pistonY * 0.9 + targetPistonY * 0.1;
                
                currentVolume = 5.0 - ((pistonY - 40) / 45);
                document.getElementById('volumeBadge').innerText = currentVolume.toFixed(1) + " Liters";

                // Update Dialogue if volume changed significantly
                updateDialogue();

                let topW = pistonY + 15; // Piston bottom plate coordinate

                // Push trapped particles below the descending piston
                particles.forEach(p => {
                    if (p.y - p.radius < topW) {
                        p.y = topW + p.radius + 1.5;
                        p.vy = Math.abs(p.vy); // Make sure it moves down
                    }
                });

                // Update & Draw Particles
                handleParticleCollisions();
                particles.forEach(p => {
                    p.move(leftW, rightW, topW, bottomW);
                    p.draw();
                });

                // Draw Syringe Glass barrel
                ctx.save();
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(leftW, 25);
                ctx.lineTo(leftW, bottomW);
                ctx.lineTo(rightW, bottomW);
                ctx.lineTo(rightW, 25);
                ctx.stroke();

                // Draw syringe measurements/graduations
                ctx.fillStyle = '#64748b';
                ctx.font = 'bold 8px monospace';
                for (let volL = 5.0; volL >= 1.0; volL -= 1.0) {
                    let gradY = 40 + (5.0 - volL) * 45 + 15;
                    ctx.fillRect(leftW + 4, gradY, 12, 1.5);
                    ctx.fillText(volL.toFixed(1) + "L", leftW + 20, gradY + 3);
                }
                ctx.restore();

                // Draw Piston Shaft & Plate
                ctx.save();
                ctx.fillStyle = '#64748b'; // shaft
                ctx.fillRect((leftW + rightW) / 2 - 8, 0, 16, pistonY);

                // Piston handle grip
                ctx.fillStyle = '#475569';
                ctx.fillRect((leftW + rightW) / 2 - 35, 0, 70, 8);

                // Piston Rubber head (seals container)
                ctx.fillStyle = '#334155';
                ctx.fillRect(leftW + 2, pistonY, (rightW - leftW) - 4, 15);
                ctx.restore();
            }

            // --- MODE 3: STORE GAS (CYLINDER PUMP) ---
            else if (currentMode === 'pump') {
                let leftW = 185, rightW = 375, topW = 65, bottomW = 265;

                // Animate Gas Pump Handle
                if (pumpState === 'pulling') {
                    pumpY -= 3.5;
                    if (pumpY <= 50) {
                        pumpState = 'pushing';
                    }
                } else if (pumpState === 'pushing') {
                    pumpY += 6.0;
                    if (pumpY >= 110) {
                        pumpY = 110;
                        pumpState = 'idle';
                        // Inject 10 gas particles at nozzle opening!
                        let newMoles = generateParticles(8, 190, 205, 150, 170, true);
                        // Make sure they have horizontal velocity pointing right into the cylinder
                        newMoles.forEach(p => {
                            p.vx = 2.5 + Math.random() * 2.0;
                            p.vy = (Math.random() - 0.5) * 1.5;
                        });
                        particles = particles.concat(newMoles);
                        addRipple(185, 160, '#fb923c');
                        document.getElementById('pumpBtn').disabled = false;
                        updateDialogue();
                    }
                }

                // If safety valve is open, particles escape through the top
                if (safetyValveOpen) {
                    document.getElementById('valveBtn').disabled = true;
                    // Escape some particles: remove those near the valve hole and create bubbles rising
                    particles.forEach((p, index) => {
                        // Valve is located at X: 270-290, Y: 65
                        if (p.x > 260 && p.x < 300 && p.y < 95) {
                            // Let particle escape with probability
                            if (Math.random() < 0.15) {
                                addRipple(p.x, 65, '#f59e0b');
                                particles.splice(index, 1);
                            }
                        }
                    });
                }

                // Update & Draw Particles in Cylinder
                handleParticleCollisions();
                particles.forEach(p => {
                    p.move(leftW, rightW, topW, bottomW);
                    p.draw();
                });

                // Draw Connecting Nozzle Tube
                ctx.save();
                ctx.strokeStyle = '#475569';
                ctx.lineWidth = 10;
                ctx.beginPath();
                ctx.moveTo(90, 220);
                ctx.quadraticCurveTo(140, 220, 140, 160);
                ctx.lineTo(185, 160);
                ctx.stroke();

                // Inner tube gas passage
                ctx.strokeStyle = '#0f172a';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();

                // Draw Air Pump Structure
                ctx.save();
                // Pump outer cylinder barrel
                ctx.strokeStyle = '#334155';
                ctx.lineWidth = 4;
                ctx.strokeRect(45, 110, 45, 120);
                ctx.fillStyle = 'rgba(51, 65, 85, 0.2)';
                ctx.fillRect(45, 110, 45, 120);

                // Plunger shaft
                ctx.fillStyle = '#94a3b8';
                ctx.fillRect(63, pumpY, 8, 120 - pumpY + 110);
                
                // Plunger handle
                ctx.fillStyle = '#475569';
                ctx.fillRect(40, pumpY - 8, 54, 8);

                // Pump Stand base
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(35, 230, 65, 10);
                ctx.restore();

                // Draw Sturdy Metal Storage Cylinder
                ctx.save();
                ctx.strokeStyle = '#64748b';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.roundRect(leftW, topW, rightW - leftW, bottomW - topW, 16);
                ctx.stroke();
                
                // Cylinder fill shading (glowing metallic edge effect)
                let cylGrad = ctx.createLinearGradient(leftW, topW, rightW, topW);
                cylGrad.addColorStop(0, 'rgba(100, 116, 139, 0.08)');
                cylGrad.addColorStop(0.2, 'rgba(100, 116, 139, 0.01)');
                cylGrad.addColorStop(0.8, 'rgba(100, 116, 139, 0.01)');
                cylGrad.addColorStop(1, 'rgba(100, 116, 139, 0.08)');
                ctx.fillStyle = cylGrad;
                ctx.fill();

                // Draw entry hole at X=185, Y=155-165
                ctx.fillStyle = '#0f172a';
                ctx.fillRect(180, 150, 8, 20);

                // Draw Valve block at the top
                ctx.fillStyle = safetyValveOpen ? '#ef4444' : '#10b981';
                ctx.fillRect(270, 50, 20, 15);
                ctx.fillStyle = '#475569';
                ctx.fillRect(265, 45, 30, 5);

                // Draw small gas escape indicator arrows if valve is open
                if (safetyValveOpen) {
                    ctx.fillStyle = '#f59e0b';
                    ctx.font = '10px sans-serif';
                    ctx.fillText("💨 ESCAPING", 250, 35);
                }
                ctx.restore();
            }

            // --- Draw and Update Collision Ripples ---
            ripples.forEach((r, idx) => {
                r.update();
                r.draw();
                if (r.alpha <= 0) {
                    ripples.splice(idx, 1);
                }
            });

            requestAnimationFrame(updateAndRender);
        }

        // Initialize simulation components on window load
        changeMode('motion');
        updateAndRender();
    </script>
</body>
</html>
