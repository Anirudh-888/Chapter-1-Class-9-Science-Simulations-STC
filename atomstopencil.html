<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STCpedia Interactive - How Atoms Make a Pencil</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-color: #1e293b;
            --text-color: #f8fafc;
            --stc-yellow: #facc15;
            --stc-blue: #38bdf8;
            --border-color: #475569;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .simulation-card {
            background-color: var(--panel-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--stc-yellow);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .canvas-container {
            position: relative;
            background-color: #020617;
            border: 3px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.95rem;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: #475569;
            height: 8px;
            border-radius: 4px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--stc-blue);
            cursor: pointer;
            transition: transform 0.1s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .stc-pedia-panel {
            border-left: 4px solid var(--stc-yellow);
            background-color: rgba(250, 204, 21, 0.1);
            padding: 15px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .character-tag {
            font-weight: bold;
            color: var(--stc-yellow);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        .dialogue-text {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="simulation-card">
        <div class="header">
            <h1>Microscopic View: Inside a Pencil</h1>
        </div>

        <div class="canvas-container">
            <canvas id="pencilCanvas" width="550" height="320"></canvas>
        </div>

        <div class="controls">
            <div class="slider-header">
                <span>🔬 Microscope Zoom Control:</span>
                <span id="zoom-label" style="color: var(--stc-blue);">1x (Macro View)</span>
            </div>
            <input type="range" id="zoomSlider" min="0" max="100" value="0">
        </div>

        <div class="stc-pedia-panel">
            <div class="character-tag">⚡ STCpedia Asks & Explains:</div>
            <div id="dialogue" class="dialogue-text">
                Look at the tip of this pencil lead (graphite). To our eyes, it looks like a single, solid, continuous piece of matter. But is it really? Drag the slider to zoom in!
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pencilCanvas');
        const ctx = canvas.getContext('2d');
        const slider = document.getElementById('zoomSlider');
        const zoomLabel = document.getElementById('zoom-label');
        const dialogue = document.getElementById('dialogue');

        // Atom positions setup (Structured Lattice grid)
        const atoms = [];
        const rows = 6;
        const cols = 9;
        const spacingX = 40;
        const spacingY = 35;
        const startX = (canvas.width / 2) - ((cols - 1) * spacingX) / 2;
        const startY = (canvas.height / 2) - ((rows - 1) * spacingY) / 2;

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                // Offset alternative rows to look like a clean structural honeycomb lattice
                let xOffset = (r % 2 === 0) ? 0 : spacingX / 2;
                atoms.push({
                    baseX: startX + (c * spacingX) + xOffset,
                    baseY: startY + (r * spacingY),
                    radius: 12
                });
            }
        }

        function drawPencil(alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 1. Draw Wooden Body of the Pencil
            ctx.fillStyle = "#eab308"; // Golden wood tone
            ctx.beginPath();
            ctx.moveTo(cx - 160, cy - 40);
            ctx.lineTo(cx + 40, cy - 40);
            ctx.lineTo(cx + 100, cy);
            ctx.lineTo(cx + 40, cy + 40);
            ctx.lineTo(cx - 160, cy + 40);
            ctx.closePath();
            ctx.fill();

            // Wood shave cut details
            ctx.fillStyle = "#fde047"; 
            ctx.beginPath();
            ctx.moveTo(cx + 40, cy - 40);
            ctx.lineTo(cx + 100, cy);
            ctx.lineTo(cx + 40, cy + 40);
            ctx.closePath();
            ctx.fill();

            // 2. Graphite Lead Tip
            ctx.fillStyle = "#334155"; // Dark graphite
            ctx.beginPath();
            ctx.moveTo(cx + 75, cy - 17);
            ctx.lineTo(cx + 100, cy);
            ctx.lineTo(cx + 75, cy + 17);
            ctx.closePath();
            ctx.fill();

            // Inner lead running through the cut
            ctx.fillRect(cx - 160, cy - 6, 200, 12);

            ctx.restore();
        }

        function drawAtoms(alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;

            // Draw interlocking covalent bond network lines first
            ctx.strokeStyle = "#475569";
            ctx.lineWidth = 2;
            atoms.forEach((atom, index) => {
                // Connect lattice points to simulate molecular grid bonds
                atoms.forEach(otherAtom => {
                    let dist = Math.hypot(atom.x - otherAtom.x, atom.y - otherAtom.y);
                    if (dist > 0 && dist < 45) {
                        ctx.beginPath();
                        ctx.moveTo(atom.x, atom.y);
                        ctx.lineTo(otherAtom.x, otherAtom.y);
                        ctx.stroke();
                    }
                });
            });

            // Draw individual vibrating Carbon spheres
            atoms.forEach(atom => {
                // Add tiny physical vibration jitter to show kinetic baseline in solids
                atom.x = atom.baseX + (Math.random() - 0.5) * 1.5;
                atom.y = atom.baseY + (Math.random() - 0.5) * 1.5;

                // Glowing core style
                let gradient = ctx.createRadialGradient(atom.x - 3, atom.y - 3, 2, atom.x, atom.y, atom.radius);
                gradient.addColorStop(0, "#cbd5e1");
                gradient.addColorStop(0.3, "#38bdf8");
                gradient.addColorStop(1, "#1d4ed8");

                ctx.beginPath();
                ctx.arc(atom.x, atom.y, atom.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                ctx.closePath();
            });

            ctx.restore();
        }

        function updateSimulation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const zoom = parseInt(slider.value);

            // Calculate cross-fading opacities based on slider values
            let pencilOpacity = 1;
            let atomOpacity = 0;

            if (zoom <= 40) {
                pencilOpacity = 1 - (zoom / 40);
                atomOpacity = 0;
                
                zoomLabel.innerText = "1x (Macro View)";
                zoomLabel.style.color = "var(--stc-blue)";
                dialogue.innerHTML = "Look at the tip of this pencil lead (graphite). To our eyes, it looks like a single, solid, continuous piece of matter. But is it really? Drag the slider to zoom in!";
            } else if (zoom > 40 && zoom < 75) {
                pencilOpacity = 0;
                // Fade atoms into scope
                atomOpacity = (zoom - 40) / 35;
                
                zoomLabel.innerText = "50,000x (Magnifying...)";
                zoomLabel.style.color = "#fb923c";
                dialogue.innerHTML = "We are breaking past the surface! The uniform black lead is disappearing, revealing that it's made up of separate individual particle structures hidden deep inside.";
            } else {
                pencilOpacity = 0;
                atomOpacity = 1;
                
                zoomLabel.innerText = "10,000,000x (Atomic View)";
                zoomLabel.style.color = "#34d399";
                dialogue.innerHTML = "<strong>BOOM! Extreme Zoom!</strong> Now you can see the absolute truth: the solid pencil lead is actually made of billions of tiny <strong>Carbon Atoms</strong> holding hands in a repeating honeycomb pattern! Notice how they vibrate slightly? Particles in solids are always moving!";
            }

            // Draw elements safely based on active layer balances
            if (pencilOpacity > 0) drawPencil(pencilOpacity);
            if (atomOpacity > 0) drawAtoms(atomOpacity);

            requestAnimationFrame(updateSimulation);
        }

        // Initialize engine cycle run
        updateSimulation();
    </script>
</body>
</html>
